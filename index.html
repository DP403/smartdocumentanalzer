<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic RAG Document Interface</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-gradient-start: #EEF2FF;
            --bg-gradient-end: #C7D2FE;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-main);
        }

        .app-container {
            background: var(--card-bg);
            max-width: 650px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            backdrop-filter: blur(10px);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }

        .header h2 {
            font-size: 1.5rem;
            color: var(--text-main);
            font-weight: 700;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .section { 
            background: white;
            border: 1px solid #E5E7EB; 
            padding: 25px; 
            margin-bottom: 25px; 
            border-radius: 12px; 
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .section:hover {
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            transform: translateY(-2px);
        }

        .section h3 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        input[type="file"] {
            flex: 1;
            padding: 10px;
            border: 1px dashed #D1D5DB;
            border-radius: 8px;
            background: #F9FAFB;
            cursor: pointer;
            color: var(--text-muted);
        }

        input[type="text"] { 
            flex: 1; 
            padding: 12px 16px; 
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 8px; 
            font-weight: 600;
            cursor: pointer; 
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        button:hover { 
            background: var(--primary-hover); 
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled { 
            background: #D1D5DB; 
            cursor: not-allowed;
            transform: none;
        }

        #uploadStatus {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 8px;
            font-weight: 500;
        }

        #logWindow { 
            padding: 16px; 
            background: #1E293B; 
            color: #10B981;
            font-family: 'Fira Code', 'Courier New', monospace; 
            font-size: 13px; 
            border-radius: 8px; 
            margin-top: 15px; 
            min-height: 80px;
            white-space: pre-wrap;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
            line-height: 1.5;
        }
        
        .log-waiting { color: #94A3B8 !important; }
        .log-error { color: #EF4444 !important; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header & Logo -->
        <div class="header">
            <!-- Using the file:/// protocol for local absolute paths -->
            <img src="file:///C:/Users/suman/Downloads/3472777e-2799-4645-a97a-71c62bf9d51f.jpg" alt="Company Logo" class="logo" onerror="this.src='https://ui-avatars.com/api/?name=RAG&background=4F46E5&color=fff&size=80'">
            <h2>Smart Document Analyzer</h2>
            <p>Upload your PDF and ask questions instantly</p>
        </div>

        <!-- Upload Section -->
        <div class="section">
            <h3>📂 1. Upload Context Document</h3>
            <div class="input-group">
                <input type="file" id="pdfFileInput" accept=".pdf" />
                <button id="uploadBtn" onclick="uploadPDF()">Process PDF</button>
            </div>
            <div id="uploadStatus">Ready for upload...</div>
        </div>

        <!-- Query Section -->
        <div class="section">
            <h3>💬 2. Run Context Queries</h3>
            <div class="input-group">
                <input type="text" id="queryInput" placeholder="e.g., What is the main conclusion of the report?" />
                <button id="queryBtn" onclick="submitQuery()">Ask AI</button>
            </div>
            <div id="logWindow" class="log-waiting">> System status: Awaiting document attachment...</div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'http://127.0.0.1:5000';

        async function uploadPDF() {
            const fileInput = document.getElementById('pdfFileInput');
            const statusDiv = document.getElementById('uploadStatus');
            const logWindow = document.getElementById('logWindow');
            const uploadBtn = document.getElementById('uploadBtn');
            
            if (!fileInput.files[0]) {
                alert("Please pick a valid PDF file first.");
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            // Loading state
            uploadBtn.disabled = true;
            statusDiv.innerHTML = "⏳ Processing document embeddings...";
            logWindow.className = "log-waiting";
            logWindow.innerText = "> Initializing processing pipeline...\n> Chunking document...";

            try {
                const response = await fetch(`${BACKEND_URL}/api/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (response.ok) {
                    statusDiv.innerHTML = "✅ Document processed and active!";
                    logWindow.className = "";
                    logWindow.innerText = `> Success: ${data.message || 'Embeddings generated successfully.'}\n> Ready for queries.`;
                } else {
                    statusDiv.innerHTML = "❌ Upload processing failed.";
                    logWindow.className = "log-error";
                    logWindow.innerText = `> Error: ${data.error}`;
                }
            } catch (err) {
                statusDiv.innerHTML = "❌ Connection error occurred.";
                logWindow.className = "log-error";
                logWindow.innerText = `> Network Error: Make sure your Flask backend is running at ${BACKEND_URL}\n> Details: ${err.message}`;
            } finally {
                uploadBtn.disabled = false;
            }
        }

        async function submitQuery() {
            const queryInput = document.getElementById('queryInput').value;
            const logWindow = document.getElementById('logWindow');
            const queryBtn = document.getElementById('queryBtn');

            if (!queryInput) {
                logWindow.className = "log-error";
                logWindow.innerText = "> Error: Please enter a query first.";
                return;
            }

            // Loading state
            queryBtn.disabled = true;
            logWindow.className = "log-waiting";
            logWindow.innerText = "> Searching semantic vectors...\n> Generating response...";

            try {
                const response = await fetch(`${BACKEND_URL}/api/query`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: queryInput })
                });
                const data = await response.json();
                
                if (response.ok) {
                    logWindow.className = ""; // Default green text
                    logWindow.innerText = `> Query: "${queryInput}"\n\n> AI Answer:\n${data.answer}`;
                } else {
                    logWindow.className = "log-error";
                    logWindow.innerText = `> Server Error: ${data.error}`;
                }
            } catch (err) {
                logWindow.className = "log-error";
                logWindow.innerText = `> Connection Failure: ${err.message}`;
            } finally {
                queryBtn.disabled = false;
            }
        }
        
        // Allow hitting "Enter" to submit query
        document.getElementById("queryInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                submitQuery();
            }
        });
    </script>
</body>
</html>
